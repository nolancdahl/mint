<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1F3D2E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>mint</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=DM+Sans:wght@300;400;500;600;700&family=Manrope:wght@300..800&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: #F4EEE0;
        font-family: 'DM Sans', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        color: #1A1A1A;
        min-height: 100vh;
      }
      #loading {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #1F3D2E; z-index: 9999;
        color: #F4EEE0; letter-spacing: -0.02em; font-size: 28px;
        font-family: 'Manrope', sans-serif; font-weight: 700; text-transform: lowercase;
      }
    </style>
  </head>
  <body>
    <div id="loading">mint</div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- homebase launcher: top-left button + side panel listing all sibling apps.
         Source: Home Base App\public\launcher.js -->
    <script>
      (function () {
        var isLocal = /^(localhost|127\.0\.0\.1|192\.|10\.)/.test(location.hostname)
        var origin = isLocal ? 'http://localhost:5290' : 'https://homebase-nolan.netlify.app'
        var s = document.createElement('script')
        s.src = origin + '/launcher.js'
        s.defer = true
        s.dataset.appKey = 'clothes'
        document.body.appendChild(s)
      })()
    </script>
  </body>
</html>
